<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מערכת מבחנים</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f0f4f8;
      direction: rtl;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .top-bar {
      background: #fff;
      border-bottom: 1px solid #dde3ed;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-bar h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e293b;
      margin: 0;
      white-space: nowrap;
    }

    .selector-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .selector-row label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      white-space: nowrap;
    }

    #quizSelect {
      padding: 8px 14px;
      border: 2px solid #dde3ed;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: #1e293b;
      cursor: pointer;
      min-width: 220px;
      transition: border-color 0.15s;
      appearance: auto;
    }
    #quizSelect:focus {
      outline: none;
      border-color: #4f7cff;
    }

    /* ── Option panels ── */
    #optionPanel {
      background: #eff6ff;
      border-bottom: 1px solid #bfdbfe;
      padding: 10px 24px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }
    #optionPanel[hidden] { display: none; }

    #optionPanel .panel-label {
      font-weight: 600;
      color: #1d4ed8;
      white-space: nowrap;
      padding-top: 2px;
    }

    #optionPanel label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      color: #1e40af;
      margin-left: 12px;
    }

    #tagList {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #tagList label {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    #tagList label:has(input:checked) {
      background: #3b82f6;
      border-color: #2563eb;
      color: #fff;
    }
    #tagList input { display: none; }

    /* ── Frame area ── */
    .frame-area {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
    }

    .frame-card {
      flex: 1;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #dde3ed;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      min-height: 560px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>מערכת מבחנים</h1>
    <div class="selector-row">
      <label for="quizSelect">בחר מבחן:</label>
      <select id="quizSelect"></select>
    </div>
  </div>

  <div id="optionPanel" hidden>
    <div id="vocabOptions" hidden>
      <span class="panel-label">סוג:</span>
      <span id="vocabModeList"></span>
      <div id="tagBox" hidden style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <span class="panel-label">תגיות:</span>
        <div id="tagList"></div>
      </div>
    </div>
    <div id="amOptions" hidden>
      <span class="panel-label">סוג:</span>
      <label><input type="radio" name="amMode" value="mcq" checked> בחירה</label>
      <label><input type="radio" name="amMode" value="open"> פתוח</label>
    </div>
  </div>

  <div class="frame-area">
    <div class="frame-card">
      <iframe id="quizFrame" src="quizzes/vocab/quiz.html?mode=drag"></iframe>
    </div>
  </div>

  <script>
    const sel = document.getElementById('quizSelect');
    const frame = document.getElementById('quizFrame');
    const optionPanel = document.getElementById('optionPanel');
    const vocabOptions = document.getElementById('vocabOptions');
    const tagList = document.getElementById('tagList');
    const tagBox = document.getElementById('tagBox');
    const vocabModeList = document.getElementById('vocabModeList');
    const amOptions = document.getElementById('amOptions');

    let catalog = null;
    let quizById = {};

    async function loadCatalog() {
      if (catalog) return catalog;
      const params = new URLSearchParams(location.search);
      const name = (params.get('name') || '').trim();
      const perNameUrl = name ? ('catalogs/' + encodeURIComponent(name) + '.json') : null;
      async function tryFetch(url) {
        try { const r = await fetch(url, { cache: 'no-cache' }); return r.ok ? r.json() : null; }
        catch (e) { return null; }
      }
      const perNameCatalog = perNameUrl ? await tryFetch(perNameUrl) : null;
      catalog = perNameCatalog || await tryFetch('quiz_catalog.json') || { quizzes: [] };
      quizById = {};
      (catalog.quizzes || []).forEach(q => { if (q && q.id) quizById[q.id] = q; });
      return catalog;
    }

    async function populateSelect() {
      const cat = await loadCatalog();
      sel.innerHTML = '';
      (cat.quizzes || []).forEach(q => {
        const opt = document.createElement('option');
        opt.value = q.id;
        opt.textContent = q.title || q.id;
        sel.appendChild(opt);
      });
      if (quizById['vocab']) sel.value = 'vocab';
    }

    function sanitizeName(name) {
      const s = (name || '').toString().trim();
      try { return s.replace(/[^\p{L}\p{N}_-]/gu, ''); }
      catch (e) { return s.replace(/[^a-zA-Z0-9_\-֐-׿]/g, ''); }
    }

    const vocabTagsCache = {};

    function getVocabQuizConfig() { return quizById['vocab'] || {}; }

    function getAllowedVocabModes() {
      const q = getVocabQuizConfig();
      const modes = Array.isArray(q.modes) && q.modes.length
        ? q.modes
        : [{ id: 'drag', label: 'מחסן (גרירה)' }, { id: 'open', label: 'פתוח' }];
      return modes.filter(m => m && m.id);
    }

    function renderVocabModeOptions() {
      const modes = getAllowedVocabModes();
      const defaultMode = (getVocabQuizConfig().defaultMode || (modes[0] && modes[0].id) || 'drag');
      vocabModeList.innerHTML = '';
      modes.forEach((mode, idx) => {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'radio'; input.name = 'vocabMode'; input.value = mode.id;
        input.checked = mode.id === defaultMode || (!modes.some(m => m.id === defaultMode) && idx === 0);
        label.appendChild(input);
        label.appendChild(document.createTextNode(' ' + (mode.label || mode.id)));
        vocabModeList.appendChild(label);
      });
    }

    function getVisibleVocabTags(allTags) {
      const q = getVocabQuizConfig();
      const tf = q.tagFilter || {};
      let tags = Array.isArray(allTags) ? allTags.slice() : [];
      if (Array.isArray(tf.allowedTags) && tf.allowedTags.length) {
        const allowed = new Set(tf.allowedTags); tags = tags.filter(t => allowed.has(t));
      }
      if (Array.isArray(tf.hiddenTags) && tf.hiddenTags.length) {
        const hidden = new Set(tf.hiddenTags); tags = tags.filter(t => !hidden.has(t));
      }
      return tags;
    }

    function getDefaultSelectedTags(visibleTags) {
      const tf = (getVocabQuizConfig().tagFilter || {});
      const requested = Array.isArray(tf.defaultSelectedTags) ? tf.defaultSelectedTags : [];
      const visible = new Set(visibleTags || []);
      return requested.filter(t => visible.has(t));
    }

    function getLockedSelectedTags(visibleTags) {
      const tf = (getVocabQuizConfig().tagFilter || {});
      const requested = Array.isArray(tf.lockedSelectedTags) ? tf.lockedSelectedTags : [];
      const visible = new Set(visibleTags || []);
      return requested.filter(t => visible.has(t));
    }

    function getVocabTagMaxSelectable() {
      const n = Number((getVocabQuizConfig().tagFilter || {}).maxSelectable || 0);
      return Number.isFinite(n) && n > 0 ? Math.floor(n) : 0;
    }

    function applyVocabTagSelectionLimit(changedInput) {
      const max = getVocabTagMaxSelectable();
      if (!max) return;
      const checked = Array.from(document.querySelectorAll('input[name="vocabTag"]:checked'));
      if (checked.length <= max) return;
      if (changedInput && changedInput.checked) { changedInput.checked = false; alert('אפשר לבחור עד ' + max + ' תגיות.'); }
    }

    async function loadVocabTagsOnce() {
      const rawName = new URLSearchParams(window.location.search).get('name');
      const name = sanitizeName(rawName);
      const cacheKey = name || '__default__';
      if (vocabTagsCache[cacheKey]) return vocabTagsCache[cacheKey];
      try {
        let questions = null;
        if (name) {
          const candidates = [`quizzes/vocab/questions_${encodeURIComponent(name)}.json`];
          const asciiLower = name.replace(/[A-Z]/g, ch => ch.toLowerCase());
          if (asciiLower !== name) candidates.push(`quizzes/vocab/questions_${encodeURIComponent(asciiLower)}.json`);
          for (const p of candidates) {
            try { const r = await fetch(p, { cache: 'no-store' }); if (r.ok) { questions = await r.json(); break; } } catch (e) {}
          }
        }
        if (!questions) questions = await fetch('quizzes/vocab/questions.json').then(r => r.json());
        const set = new Set();
        questions.forEach(q => (q.tags || []).forEach(t => set.add(t)));
        vocabTagsCache[cacheKey] = Array.from(set).sort((a, b) => a.localeCompare(b, 'he'));
      } catch (e) { vocabTagsCache[cacheKey] = []; }
      return vocabTagsCache[cacheKey];
    }

    function getSelectedVocabMode() { const r = document.querySelector('input[name="vocabMode"]:checked'); return r ? r.value : 'drag'; }
    function getSelectedTags() { return Array.from(document.querySelectorAll('input[name="vocabTag"]:checked')).map(x => x.value); }
    function getSelectedAmMode() { const r = document.querySelector('input[name="amMode"]:checked'); return r ? r.value : 'mcq'; }

    async function refreshVocabTagsUI() {
      const allTags = await loadVocabTagsOnce();
      const tf = (getVocabQuizConfig().tagFilter || {});
      const enabled = tf.enabled !== false;
      const tags = getVisibleVocabTags(allTags);
      const defaultSelected = new Set(getDefaultSelectedTags(tags));
      const lockedSelected = new Set(getLockedSelectedTags(tags));
      tagBox.hidden = !enabled;
      tagList.innerHTML = '';
      if (!enabled) return;
      tags.forEach(t => {
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.name = 'vocabTag'; cb.value = t;
        cb.checked = defaultSelected.has(t) || lockedSelected.has(t);
        cb.disabled = lockedSelected.has(t);
        label.appendChild(cb);
        label.appendChild(document.createTextNode(' ' + t));
        tagList.appendChild(label);
      });
    }

    function setFrameSrc(url) { frame.src = url; }

    function buildVocabUrl() {
      const q = quizById['vocab'];
      const base = (q && q.page) ? q.page : 'quizzes/vocab/quiz.html';
      const params = new URLSearchParams();
      const outerName = new URLSearchParams(location.search).get('name');
      if (outerName) params.set('name', outerName);
      params.set('mode', getSelectedVocabMode());
      const tags = getSelectedTags();
      if (tags.length) params.set('tags', tags.join(','));
      return base + '?' + params.toString();
    }

    function buildAmUrl() {
      const q = quizById['am_is_are'];
      const base = (q && q.page) ? q.page : 'quizzes/am_is_are/quiz.html';
      const params = new URLSearchParams();
      const outerName = new URLSearchParams(location.search).get('name');
      if (outerName) params.set('name', outerName);
      params.set('mode', getSelectedAmMode());
      return base + '?' + params.toString();
    }

    function hideAllOptions() {
      vocabOptions.hidden = true;
      amOptions.hidden = true;
      optionPanel.hidden = true;
    }

    async function onSelectChanged() {
      const id = sel.value;
      hideAllOptions();
      if (id === 'vocab') {
        optionPanel.hidden = false;
        vocabOptions.hidden = false;
        renderVocabModeOptions();
        await refreshVocabTagsUI();
        setFrameSrc(buildVocabUrl());
        return;
      }
      if (id === 'am_is_are') {
        optionPanel.hidden = false;
        amOptions.hidden = false;
        setFrameSrc(buildAmUrl());
        return;
      }
      const q = quizById[id];
      if (q && q.page) setFrameSrc(q.page);
      else setFrameSrc(id);
    }

    sel.addEventListener('change', onSelectChanged);
    document.addEventListener('change', (e) => {
      if (e.target && e.target.name === 'vocabMode') setFrameSrc(buildVocabUrl());
      if (e.target && e.target.name === 'vocabTag') { applyVocabTagSelectionLimit(e.target); setFrameSrc(buildVocabUrl()); }
      if (e.target && e.target.name === 'amMode') setFrameSrc(buildAmUrl());
    });

    (async () => { await populateSelect(); renderVocabModeOptions(); await onSelectChanged(); })();
  </script>
</body>
</html>
